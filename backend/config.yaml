# Chatbot Configuration
app_name: "Dress Design Chatbot"
version: "1.0.0"
environment: "development"

# Server Configuration
server_host: "0.0.0.0"
server_port: 8001

# OpenAI Configuration
openai_api_key: "${OPENAI_API_KEY}"
openai_model: "gpt-4o"
openai_max_tokens: 1000
openai_temperature: 0.7

# PostgreSQL Database Configuration
database_url: "postgresql://chatbot:chatbot_secret@localhost:5432/chatbot_db"
database_url_sync: "postgresql+psycopg2://chatbot:chatbot_secret@localhost:5432/chatbot_db"

# PostgreSQL Connection Settings
postgres_host: "localhost"
postgres_port: 5432
postgres_user: "chatbot"
postgres_password: "chatbot_secret"
postgres_db: "chatbot_db"

# Redis Configuration (for caching/sessions)
redis_host: "localhost"
redis_port: 6379
redis_db: 0

# MongoDB Configuration (for chat history)
mongodb_url: "mongodb://localhost:27017"
mongodb_db: "chatbot_db"

# ChromaDB Vector Store Configuration
vector_store_type: "docker"  # "docker" for ChromaDB in Docker, "local" for file-based
chromadb_host: "localhost"
chromadb_port: 8000
vector_store_path: "./data/vector_store"
chroma_persist_directory: "./data/chroma"

# Session Configuration
session_secret_key: "your-secret-key-change-in-production"
session_expire_minutes: 60

# Logging Configuration
log_level: "INFO"
log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# CORS Configuration
cors_origins:
  - "http://localhost:3000"
  - "http://localhost:5173"
  - "http://127.0.0.1:5173"
  - "http://localhost:8001"
  - "http://127.0.0.1:8001"
